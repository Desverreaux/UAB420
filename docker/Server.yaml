services:
  backend:
    build:
      context: ..
      dockerfile: docker/Services/Backend
    ports:
      - "8000:8000"
    env_file:
      - ../backend/.env
    volumes:
      - ..:/repo
    networks:
      - app-network
    
  frontend:
    build:
      context: ..
      dockerfile: docker/Services/Frontend
    expose:
      - "80"
    volumes:
      - ..:/repo
      - frontend_node_modules:/repo/frontend/Vue-Project/node_modules
    networks:
      - app-network

  gitupdater:

    build:
      context: ..
      dockerfile: docker/Services/GitUpdater
    ports:
      - "8500:8500"
    env_file:
      - ../backend/.env
    volumes:
      - ..:/repo
      - /root/.ssh/id_ed25519:/root/.ssh/id_ed25519:ro
    networks:
      - app-network

  nginx:
    build:
      context: ..
      dockerfile: docker/Services/Nginx
    ports:
      - "80:80"
      # - "443:443"
    depends_on:
      - backend
      - frontend
      - gitupdater
    networks:
      - app-network

networks:
  app-network:
    driver: bridge

volumes:
  frontend_node_modules: