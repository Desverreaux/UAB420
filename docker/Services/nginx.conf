events {
    worker_connections 1024;
}

http {
    # HTTP server — handles ACME challenges; proxies traffic normally until SSL is set up
    server {
        listen 80;
        server_name uab420.desverreaux.com;

        # Let's Encrypt ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Route API traffic to the backend container
        location /api/ {
            proxy_pass http://backend:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Route webhook traffic to the GitUpdater container
        location /webhook {
            proxy_pass http://gitupdater:8500;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # Everything else goes to the frontend container
        location / {
            proxy_pass http://frontend:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }

