events {
    worker_connections 1024;
}

http {
    # HTTP server — handles ACME challenges and redirects everything else to HTTPS
    server {
        listen 80;
        server_name uab420.desverreaux.com;

        # Let's Encrypt ACME challenge
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        # Redirect all other HTTP traffic to HTTPS
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # HTTPS server
    server {
        listen 443 ssl;
        server_name uab420.desverreaux.com;

        ssl_certificate     /etc/letsencrypt/live/uab420.desverreaux.com/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/uab420.desverreaux.com/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        # Route API traffic to the backend container
        location /api/ {
            proxy_pass http://backend:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Route webhook traffic to the GitUpdater container
        location /webhook {
            proxy_pass http://gitupdater:8500;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Everything else goes to the frontend container
        location / {
            proxy_pass http://frontend:80;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}